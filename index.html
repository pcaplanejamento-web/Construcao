<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <!-- viewport-fit=cover: o conteúdo ocupa a tela inteira (sob o notch/status bar e
         a barra transparente do Safari iOS) — combinado com env(safe-area-inset-*). -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="description" content="Sistema de Gestão de Obras — cadastre obras e acompanhe despesas em tempo real." />
    <meta name="theme-color" content="#0d9488" />
    <!-- Modo "app" no iOS/Android (tela cheia ao salvar na tela inicial; status bar translúcida). -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Dattaobra" />

    <!-- Caminho-base da implantação. Raiz ("/") no domínio próprio (Cloudflare) e
         "/Construcao/" quando servido pelo GitHub Pages (página de projeto). Tem
         de vir ANTES de qualquer CSS/asset para que os caminhos relativos (e os
         relativos dentro dos Shadow DOMs) resolvam no prefixo correto. -->
    <script>
      document.write(
        '<base href="' +
          (location.hostname.endsWith("github.io") ? "/Construcao/" : "/") +
          '">'
      );
    </script>

    <title>Dattaobra</title>
    <link rel="icon" type="image/png" href="src/assets/dattaobra.png" />

    <!-- Fontes: Space Grotesk (títulos/números) + Plus Jakarta Sans (corpo) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap"
    />

    <!-- Aplica o tema salvo antes do CSS (evita flash de tema errado) e já tinge o
         chrome do navegador (theme-color) com a cor de fundo do tema → no escuro o
         navegador fica escuro de imediato (sem flash). Depois theme.js mantém em sincronia. -->
    <script>
      try {
        var t = localStorage.getItem("obras.tema");
        if (t === "claro" || t === "escuro")
          document.documentElement.dataset.tema = t;
        var escuro = t === "escuro" || (t !== "claro" && matchMedia("(prefers-color-scheme: dark)").matches);
        var mc = document.querySelector('meta[name="theme-color"]');
        if (mc) mc.setAttribute("content", escuro ? "#0b1220" : "#f3f5f8");
      } catch (e) {}
    </script>

    <!-- App sem ZOOM (mobile): além do viewport (maximum-scale/user-scalable), o iOS
         ignora user-scalable; então bloqueamos a pinça (gesture*) e o double-tap. -->
    <script>
      (function () {
        ["gesturestart", "gesturechange", "gestureend"].forEach(function (ev) {
          document.addEventListener(ev, function (e) { e.preventDefault(); }, { passive: false });
        });
        var ult = 0;
        document.addEventListener("touchend", function (e) {
          var agora = Date.now();
          if (agora - ult <= 300) e.preventDefault(); // double-tap zoom
          ult = agora;
        }, { passive: false });
      })();
    </script>

    <!-- Estilos globais (fora do Shadow DOM): tokens, reset e layout -->
    <link rel="stylesheet" href="src/styles/tokens.css" />
    <link rel="stylesheet" href="src/styles/reset.css" />
    <link rel="stylesheet" href="src/styles/global.css" />
  </head>
  <body>
    <!-- O app-shell é o único elemento de UI montado diretamente no HTML.
         Ele assume o controle da renderização das views via roteador. -->
    <app-shell></app-shell>

    <!-- Host singleton de notificações (toasts), fora do shell para sobrepor tudo. -->
    <toast-host></toast-host>

    <noscript>
      <p style="padding: 1rem; font-family: sans-serif">
        Este sistema precisa de JavaScript habilitado para funcionar.
      </p>
    </noscript>

    <!-- Ponto de entrada da aplicação. type="module" habilita ES Modules. -->
    <script type="module" src="src/app.js"></script>
  </body>
</html>
