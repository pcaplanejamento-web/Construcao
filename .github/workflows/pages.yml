name: Deploy GitHub Pages

# Publica SÓ o frontend (dist/, via scripts/build-site.sh) no GitHub Pages a cada
# push na main — o backend (apps-script/), docs/ e test/ ficam de fora, então o
# código do servidor NÃO vai ao ar. Em Settings → Pages, a origem é "GitHub Actions".

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Pages
        uses: actions/configure-pages@v5

      - name: Build (somente frontend + fallback SPA)
        run: bash scripts/build-site.sh

      - name: Upload do artefato (dist/ — somente frontend)
        uses: actions/upload-pages-artifact@v3
        with:
          path: "dist"

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
